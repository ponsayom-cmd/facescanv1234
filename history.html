<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Attendance History</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px 20px; }
    .box { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; background: #4f46e5; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .log-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
    .late { color: #d97706; font-weight: 700; }
    .ontime { color: #059669; font-weight: 700; }
  </style>
</head>
<body>

<div class="box">
  <h2 style="margin:0;">🎓 เช็คประวัติการเรียน</h2>
  <p style="color:#64748b; font-size:14px; margin-bottom:20px;">กรอกรหัสนักศึกษาเพื่อดูประวัติย้อนหลัง</p>
  <input type="text" id="sid" placeholder="ระบุรหัสนักศึกษา">
  <button onclick="search()">ตรวจสอบข้อมูล</button>
  <div id="results" style="margin-top:20px;"></div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  async function search() {
    const id = document.getElementById('sid').value;
    if (!id) return alert('กรุณากรอกรหัส');
    document.getElementById('results').innerHTML = 'กำลังค้นหา...';
    const res = await fetch(`${API_URL}?action=getStudentHistory&studentId=${encodeURIComponent(id)}`);
    const data = await res.json();
    document.getElementById('results').innerHTML = data.history.map(h => `
      <div class="log-item">
        <div>
          <div style="font-weight:600;">${h.date}</div>
          <div style="font-size:12px; color:#64748b;">${h.subject}</div>
        </div>
        <div class="${h.status === 'Late' ? 'late' : 'ontime'}">${h.status === 'Late' ? 'สาย' : 'ปกติ'}</div>
      </div>
    `).join('') || 'ไม่พบประวัติการเข้าเรียน';
  }
</script>
</body>
</html>
