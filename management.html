<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>จัดการข้อมูล</title>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; max-width: 600px; margin-inline: auto; }
    input { padding: 10px; border-radius: 5px; border: none; width: 70%; margin-right: 10px; }
    button { padding: 10px 20px; border-radius: 5px; border: none; background: #34d399; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid rgba(255,255,255,0.1); padding: 10px; text-align: left; }
    .del-btn { background: #ef4444; color: white; padding: 5px 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <h3>📚 เพิ่มรายวิชา</h3>
    <input type="text" id="subCode" placeholder="รหัสวิชา">
    <input type="text" id="subName" placeholder="ชื่อวิชา">
    <button onclick="addSubject()">เพิ่ม</button>
    <table id="subTable"><tr><th>รหัส</th><th>ชื่อวิชา</th><th>จัดการ</th></tr></table>
  </div>

  <div class="card">
    <h3>👤 รายชื่อนักศึกษา</h3>
    <table id="stuTable"><tr><th>รหัส</th><th>ชื่อ</th><th>ปี</th><th>จัดการ</th></tr></table>
  </div>

  <a href="index.html" style="color:white; display:block; text-align:center;">กลับหน้าหลัก</a>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');

    async function loadData() {
      // โหลดวิชา
      const res1 = await fetch(API_URL + '?action=getSubjects');
      const subs = await res1.json();
      const subTable = document.getElementById('subTable');
      subTable.innerHTML = '<tr><th>รหัส</th><th>ชื่อวิชา</th><th>จัดการ</th></tr>';
      subs.forEach(s => {
        subTable.innerHTML += `<tr><td>${s.code}</td><td>${s.name}</td><td><button class="del-btn" onclick="deleteItem('subject','${s.code}')">ลบ</button></td></tr>`;
      });

      // โหลดนักศึกษา
      const res2 = await fetch(API_URL + '?action=getStudents');
      const stus = await res2.json();
      const stuTable = document.getElementById('stuTable');
      stuTable.innerHTML = '<tr><th>รหัส</th><th>ชื่อ</th><th>ปี</th><th>จัดการ</th></tr>';
      stus.forEach(s => {
        stuTable.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.year}</td><td><button class="del-btn" onclick="deleteItem('student','${s.id}')">ลบ</button></td></tr>`;
      });
    }

    async function addSubject() {
      const code = document.getElementById('subCode').value;
      const name = document.getElementById('subName').value;
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addSubject', code, name }) });
      loadData();
    }

    async function deleteItem(type, id) {
      if(!confirm('ยืนยันการลบ?')) return;
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteItem', type, id }) });
      loadData();
    }

    loadData();
  </script>
</body>
</html>
