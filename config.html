<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Classroom Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: var(--bg);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: var(--card);
      width: 100%;
      max-width: 450px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }
    h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
    .field { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
    input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .status {
      margin-top: 15px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>⚙️ ตั้งค่าระบบเช็คชื่อ</h2>
  
  <div class="field">
    <label>Google Apps Script URL:</label>
    <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
  </div>

  <div class="field">
    <label>ชื่อวิชาเรียน:</label>
    <input type="text" id="subject" placeholder="เช่น วิทยาศาสตร์ ม.3">
  </div>

  <div class="field">
    <label>ห้องเรียน:</label>
    <input type="text" id="room" placeholder="เช่น ห้อง 421">
  </div>

  <button class="btn" onclick="save()">บันทึกข้อมูลวิชา</button>
  <div id="status" class="status"></div>
</div>

<script>
  // โหลด API URL จาก localStorage
  document.getElementById('apiUrl').value = localStorage.getItem('gasApiUrl') || '';

  async function save() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    const subject = document.getElementById('subject').value;
    const room = document.getElementById('room').value;

    if (!apiUrl) return alert('กรุณาระบุ URL ของระบบหลังบ้าน');
    localStorage.setItem('gasApiUrl', apiUrl);

    const status = document.getElementById('status');
    status.style.display = 'block';
    status.innerText = '⏳ กำลังบันทึก...';
    status.style.background = '#334155';

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveConfig', subject, room })
      });
      const data = await res.json();
      status.innerText = '✅ บันทึกสำเร็จ: ระบบพร้อมเช็คชื่อวิชา ' + subject;
      status.style.background = 'rgba(16, 185, 129, 0.2)';
      status.style.color = '#10b981';
    } catch (e) {
      status.innerText = '❌ ผิดพลาด: ' + e.message;
      status.style.background = 'rgba(239, 68, 68, 0.2)';
      status.style.color = '#ef4444';
    }
  }
</script>
</body>
</html>
