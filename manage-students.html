<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการรายชื่อ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .card { background: #1e293b; border-radius: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
    .btn-del { color: #f87171; cursor: pointer; background: none; border: 1px solid #f87171; padding: 5px 10px; border-radius: 5px; }
    .search { width: 100%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" style="color:#94a3b8; text-decoration:none;">← กลับ</a>
    <h2 style="margin: 15px 0;">รายชื่อนักศึกษา</h2>
    <input type="text" id="search" class="search" placeholder="ค้นหาชื่อหรือรหัส..." onkeyup="filter()">
    <table>
      <thead><tr><th>รหัส</th><th>ชื่อ</th><th>จัดการ</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </div>
  <script>
    const API = localStorage.getItem('gasApiUrl');
    let students = [];
    async function load() {
      const res = await fetch(`${API}?action=getStudentsList`);
      students = await res.json();
      render(students);
    }
    function render(data) {
      document.getElementById('list').innerHTML = data.map(s => `
        <tr><td>${s.id}</td><td>${s.name}</td>
        <td><button class="btn-del" onclick="del('${s.id}')">ลบ</button></td></tr>
      `).join('');
    }
    function filter() {
      const val = document.getElementById('search').value.toLowerCase();
      render(students.filter(s => s.id.includes(val) || s.name.toLowerCase().includes(val)));
    }
    async function del(id) {
      if(!confirm('ยืนยันการลบ?')) return;
      await fetch(API, { method:'POST', body: JSON.stringify({action:'deleteStudent', studentId:id}) });
      load();
    }
    window.onload = load;
  </script>
</body>
</html>
