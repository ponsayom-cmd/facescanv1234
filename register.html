<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
    }
    .camera-box {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 3px solid #334155;
      position: relative;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    input {
      width: 100%;
      max-width: 480px;
      padding: 15px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }
    .btn {
      width: 100%;
      max-width: 480px;
      padding: 18px;
      background: #10b981;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .btn:disabled { background: #475569; }
  </style>
</head>
<body>

<h1>👤 ลงทะเบียนนักเรียน</h1>
<p style="margin-bottom: 20px; color: #94a3b8;">ถ่ายภาพหน้าตรงเพื่อบันทึกลงฐานข้อมูล</p>

<div class="camera-box">
  <video id="video" autoplay muted playsinline></video>
</div>

<input type="text" id="studentName" placeholder="ระบุชื่อ-นามสกุล นักเรียน">
<button id="btnSave" class="btn" onclick="capture()">📷 บันทึกใบหน้า</button>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');

  async function start() {
    // โหลด AI Model
    await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
    await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
    
    // เริ่มกล้อง
    const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
    video.srcObject = stream;
  }

  async function capture() {
    const name = document.getElementById('studentName').value;
    if (!name) return alert('กรุณากรอกชื่อนักเรียน');
    if (!API_URL) return alert('กรุณาตั้งค่า API ในหน้า Config ก่อน');

    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.innerText = '⏳ กำลังสแกน...';

    const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if (!detect) {
      alert('ไม่พบใบหน้า กรุณาจัดตำแหน่งหน้าให้อยู่กลางกล้อง');
      btn.disabled = false;
      btn.innerText = '📷 บันทึกใบหน้า';
      return;
    }

    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', name, faceDescriptor: Array.from(detect.descriptor) })
      });
      alert('ลงทะเบียนคุณ ' + name + ' สำเร็จ!');
      document.getElementById('studentName').value = '';
    } catch (e) {
      alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
    } finally {
      btn.disabled = false;
      btn.innerText = '📷 บันทึกใบหน้า';
    }
  }

  start();
</script>
</body>
</html>
