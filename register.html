<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: #1e293b; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; }
    video { width: 100%; border-radius: 15px; transform: scaleX(-1); background: #000; margin-bottom: 20px; }
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: #334155; color: white; }
    .btn { width: 100%; padding: 15px; background: #34d399; color: #064e3b; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align:center; margin-bottom:20px;">ลงทะเบียนนักศึกษา</h2>
    <video id="video" autoplay muted playsinline></video>
    <input type="text" id="sid" placeholder="รหัสนักศึกษา">
    <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
    <select id="year">
      <option value="1">ปี 1</option><option value="2">ปี 2</option>
      <option value="3">ปี 3</option><option value="4">ปี 4</option>
    </select>
    <button id="btn" class="btn" disabled>รอ AI โหลด...</button>
    <p id="msg" style="text-align:center; margin-top:15px;"></p>
    <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#94a3b8; text-decoration:none;">🏠 กลับหน้าหลัก</a>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');
    const video = document.getElementById('video');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    async function init() {
      const URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
      try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(URL);
        await faceapi.nets.faceLandmarks68Net.loadFromUri(URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
        btn.innerText = '📸 บันทึกใบหน้า'; btn.disabled = false;
      } catch (e) { msg.innerText = '❌ โหลด AI ล้มเหลว'; }
    }

    btn.onclick = async () => {
      const sid = document.getElementById('sid').value;
      const name = document.getElementById('name').value;
      if (!sid || !name) return alert('กรอกข้อมูลไม่ครบ');
      
      btn.disabled = true; btn.innerText = '⏳ ตรวจจับ...';
      const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      
      if (!detect) {
        alert('ไม่พบใบหน้า'); btn.disabled = false; btn.innerText = '📸 บันทึกใบหน้า'; return;
      }

      msg.innerText = '☁️ กำลังบันทึก...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'registerUser', studentId: sid, name, year: document.getElementById('year').value, faceDescriptor: Array.from(detect.descriptor) })
        });
        const d = await res.json();
        msg.innerText = '✅ ' + d.message;
        document.getElementById('sid').value = ''; document.getElementById('name').value = '';
      } catch (e) { msg.innerText = '❌ บันทึกไม่สำเร็จ'; }
      btn.disabled = false; btn.innerText = '📸 บันทึกใบหน้า';
    };
    init();
  </script>
</body>
</html>
