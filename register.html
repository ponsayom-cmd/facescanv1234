<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนใบหน้า - ป้องกันการลงทะเบียนซ้ำ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #4f46e5; --error: #ef4444; --success: #10b981; }
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
    #videoContainer { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    video { width: 100%; height: 100%; object-fit: cover; }
    input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status { margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
    .status-error { color: var(--error); }
    .status-success { color: var(--success); }
    .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 10; display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2 style="margin-bottom:10px;">👤 ลงทะเบียนนักศึกษา</h2>
  <p style="font-size:14px; color:#64748b; margin-bottom:20px;">กรุณามองกล้องและใส่รหัสนักศึกษา</p>

  <div id="videoContainer">
    <video id="video" autoplay muted playsinline></video>
    <div id="loader" class="loading-overlay">⏳ กำลังตรวจสอบใบหน้า...</div>
  </div>

  <input type="text" id="studentName" placeholder="ระบุชื่อหรือรหัสนักศึกษา">
  <button id="regBtn" onclick="handleRegistration()" disabled>กรุณารอโหลดโมเดล...</button>
  <div id="status"></div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  const regBtn = document.getElementById('regBtn');
  const statusDiv = document.getElementById('status');
  const loader = document.getElementById('loader');
  
  let knownFaces = []; // เก็บข้อมูลใบหน้าที่ลงทะเบียนแล้วมาเทียบ

  async function init() {
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);
      
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      
      // ดึงข้อมูลใบหน้าที่มีอยู่แล้วมาเตรียมพร้อม
      if (API_URL) {
        const res = await fetch(API_URL + "?action=getKnownFaces");
        const data = await res.json();
        knownFaces = data.faces || [];
      }

      regBtn.innerText = "ลงทะเบียนใบหน้า";
      regBtn.disabled = false;
      statusDiv.innerText = "✅ ระบบพร้อมใช้งาน";
      statusDiv.className = "status-success";
    } catch (err) {
      statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการโหลดระบบ";
      statusDiv.className = "status-error";
      console.error(err);
    }
  }

  async function handleRegistration() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) {
      alert("กรุณาระบุชื่อหรือรหัสนักศึกษา");
      return;
    }

    regBtn.disabled = true;
    loader.style.display = "flex";
    statusDiv.innerText = "🔍 กำลังประมวลผลใบหน้า...";

    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if (!detection) {
      statusDiv.innerText = "❌ ไม่พบใบหน้า กรุณามองที่กล้องตรงๆ";
      statusDiv.className = "status-error";
      regBtn.disabled = false;
      loader.style.display = "none";
      return;
    }

    // --- ส่วนตรวจสอบการลงทะเบียนซ้ำ (Face Matching) ---
    let isDuplicate = false;
    let existingOwner = "";

    if (knownFaces.length > 0) {
      const labeledDescriptors = knownFaces.map(f => 
        new faceapi.LabeledFaceDescriptors(f.name, f.descriptors.map(d => new Float32Array(d)))
      );
      const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6); // ค่าความเข้มงวด 0.6
      const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

      // ถ้าชื่อที่ตรวจเจอ ไม่ใช่ "unknown" และไม่ใช่ชื่อที่เรากำลังจะลงทะเบียน (เพื่อให้อัปเดตชื่อเดิมได้)
      if (bestMatch.label !== 'unknown' && bestMatch.label !== name) {
        isDuplicate = true;
        existingOwner = bestMatch.label;
      }
    }

    if (isDuplicate) {
      statusDiv.innerHTML = `❌ ใบหน้านี้ถูกลงทะเบียนไว้แล้วในชื่อ: <br><strong style="font-size:18px;">${existingOwner}</strong>`;
      statusDiv.className = "status-error";
      regBtn.disabled = false;
      loader.style.display = "none";
      return;
    }

    // --- หากไม่ซ้ำ ให้ทำการบันทึก ---
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'registerUser',
          name: name,
          faceDescriptor: Array.from(detection.descriptor)
        })
      });
      const result = await response.json();
      
      if (result.success) {
        statusDiv.innerText = "✅ " + result.message;
        statusDiv.className = "status-success";
        // อัปเดตข้อมูล Local ไว้ด้วยกันสแกนซ้ำทันที
        knownFaces.push({ name: name, descriptors: [Array.from(detection.descriptor)] });
        document.getElementById('studentName').value = "";
      }
    } catch (err) {
      statusDiv.innerText = "❌ บันทึกไม่สำเร็จ กรุณาลองใหม่";
      statusDiv.className = "status-error";
    } finally {
      regBtn.disabled = false;
      loader.style.display = "none";
    }
  }

  init();
</script>
</body>
</html>
