<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .card { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { text-align: center; margin-bottom: 20px; color: #1e293b; }
    video { width: 100%; border-radius: 15px; background: #000; transform: scaleX(-1); margin-bottom: 20px; }
    .field { margin-bottom: 15px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    .btn { width: 100%; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: 600; }
  </style>
</head>
<body>

  <div class="card">
    <h2>ลงทะเบียนนักศึกษา</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="field">
      <label>รหัสนักศึกษา</label>
      <input type="text" id="studentId" placeholder="กรอกรหัสนักศึกษา">
    </div>

    <div class="field">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="name" placeholder="ระบุชื่อจริง">
    </div>

    <div class="field">
      <label>ชั้นปี</label>
      <select id="year">
        <option value="1">ปี 1</option><option value="2">ปี 2</option>
        <option value="3">ปี 3</option><option value="4">ปี 4</option>
      </select>
    </div>

    <button id="btnSave" class="btn" disabled>กำลังโหลด AI...</button>
    <div id="status"></div>
    <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#94a3b8; text-decoration:none;">กลับหน้าหลัก</a>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');
    const video = document.getElementById('video');
    const btn = document.getElementById('btnSave');
    const status = document.getElementById('status');

    async function initAI() {
      const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(URL);
        await faceapi.nets.faceLandmarks68Net.loadFromUri(URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
        btn.innerText = '📸 บันทึกใบหน้า';
        btn.disabled = false;
      } catch (e) {
        status.innerHTML = '<span style="color:red">❌ โหลดระบบผิดพลาด</span>';
      }
    }

    btn.onclick = async () => {
      const id = document.getElementById('studentId').value.trim();
      const name = document.getElementById('name').value.trim();
      const year = document.getElementById('year').value;

      if (!id || !name) return alert('กรุณากรอกข้อมูลให้ครบ');
      if (!API_URL) return alert('กรุณาตั้งค่า API URL ก่อน');

      btn.disabled = true;
      btn.innerText = '⏳ ตรวจจับใบหน้า...';
      
      const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (!detect) {
        alert('ไม่พบใบหน้า');
        btn.disabled = false;
        btn.innerText = '📸 บันทึกใบหน้า';
        return;
      }

      status.innerText = 'ส่งข้อมูลไป Google Sheets...';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'registerUser',
            studentId: id,
            name: name,
            year: year,
            faceDescriptor: Array.from(detect.descriptor)
          })
        });
        const result = await res.json();
        status.innerHTML = '<span style="color:green">✅ ' + result.message + '</span>';
        document.getElementById('studentId').value = '';
        document.getElementById('name').value = '';
      } catch (e) {
        status.innerHTML = '<span style="color:red">❌ บันทึกล้มเหลว</span>';
      }
      btn.disabled = false;
      btn.innerText = '📸 บันทึกใบหน้า';
    };

    initAI();
  </script>
</body>
</html>
