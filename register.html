<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักเรียนใหม่</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(30, 41, 59, 0.8);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { margin-bottom: 20px; color: #38bdf8; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #fff;
      margin-bottom: 20px;
      font-size: 1rem;
    }
    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
      margin-bottom: 20px;
      transform: scaleX(-1);
    }
    .btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 1.1rem;
      transition: 0.3s;
    }
    .btn:disabled { background: #64748b; cursor: not-allowed; }
    .status { margin-top: 15px; font-size: 0.9rem; }
    .nav-link { margin-top: 20px; display: block; color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>

  <div class="container">
    <h1>📝 ลงทะเบียนนักเรียน</h1>
    <input type="text" id="studentName" placeholder="กรอกชื่อ-นามสกุล นักเรียน">
    
    <video id="video" autoplay muted playsinline></video>
    
    <button id="btnSave" class="btn">📸 บันทึกใบหน้า (0/3)</button>
    <div id="msg" class="status">รอโหลด AI...</div>
    
    <a href="index.html" class="nav-link">กลับหน้าหลัก</a>
  </div>

  <script>
    const video = document.getElementById('video');
    const btnSave = document.getElementById('btnSave');
    const msg = document.getElementById('msg');
    let saveCount = 0;

    async function init() {
      try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
        await faceapi.nets.faceLandmarks68Net.loadFromUri('/models');
        await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
        
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
        msg.innerText = '✅ ระบบพร้อมใช้งาน';
      } catch (err) {
        msg.innerText = '❌ ผิดพลาด: ' + err.message;
      }
    }

    btnSave.onclick = async () => {
      const name = document.getElementById('studentName').value.trim();
      if (!name) return alert('กรุณาระบุชื่อนักเรียน');

      btnSave.disabled = true;
      msg.innerText = '⏳ กำลังประมวลผลใบหน้า...';

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      
      if (!detection) {
        alert('ไม่พบใบหน้า กรุณามองที่กล้อง');
        btnSave.disabled = false;
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'registerUser',
            name: name,
            faceDescriptor: Array.from(detection.descriptor)
          })
        });
        const result = await response.json();
        
        saveCount++;
        btnSave.innerText = `📸 บันทึกเพิ่ม (${saveCount}/3)`;
        msg.innerText = '✅ บันทึกสำเร็จ! ขยับหน้าเล็กน้อยแล้วบันทึกอีกครั้ง';
        
        if (saveCount >= 3) {
           alert('ลงทะเบียนสมบูรณ์');
           window.location.href = 'index.html';
        }
      } catch (e) {
        msg.innerText = '❌ ส่งข้อมูลไม่สำเร็จ: ' + e.message;
      }
      btnSave.disabled = false;
    };

    window.onload = init;
  </script>
</body>
</html>
