<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียน - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #f8fafc;
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }
    h2 { margin-bottom: 20px; color: #1e293b; font-weight: 700; }
    #video {
      width: 100%;
      border-radius: 16px;
      background: #000;
      transform: scaleX(-1);
      margin-bottom: 20px;
    }
    .input-group { margin-bottom: 15px; text-align: left; }
    label { font-size: 0.9rem; font-weight: 600; color: #64748b; margin-left: 4px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-family: inherit;
      margin-top: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
    #status { margin-top: 15px; font-size: 0.9rem; min-height: 1.2em; }
    .success { color: #10b981; font-weight: 600; }
    .error { color: #ef4444; font-weight: 600; }
    .loading-spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <h2>ลงทะเบียนนักศึกษา</h2>
    <video id="video" autoplay muted playsinline></video>
    
    <div class="input-group">
      <label>รหัสนักศึกษา</label>
      <input type="text" id="studentId" placeholder="เช่น 64XXXXXX">
    </div>

    <div class="input-group">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="name" placeholder="ระบุชื่อจริง">
    </div>

    <div class="input-group">
      <label>ชั้นปี</label>
      <select id="year">
        <option value="1">ชั้นปีที่ 1</option>
        <option value="2">ชั้นปีที่ 2</option>
        <option value="3">ชั้นปีที่ 3</option>
        <option value="4">ชั้นปีที่ 4</option>
        <option value="อื่นๆ">อื่นๆ</option>
      </select>
    </div>

    <button id="btnSave" class="btn" disabled>รอโหลดระบบ AI...</button>
    <div id="status"></div>
    
    <a href="index.html" style="display:inline-block; margin-top:20px; color:#94a3b8; text-decoration:none; font-size:0.9rem;">🏠 กลับหน้าหลัก</a>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');
    const video = document.getElementById('video');
    const btnSave = document.getElementById('btnSave');
    const status = document.getElementById('status');

    // โหลด Model จาก CDN ที่เสถียร
    async function loadModels() {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        startVideo();
      } catch (e) {
        status.innerHTML = '<span class="error">❌ โหลด AI ล้มเหลว กรุณารีเฟรช</span>';
      }
    }

    function startVideo() {
      navigator.mediaDevices.getUserMedia({ video: { width: 640 } })
        .then(stream => {
          video.srcObject = stream;
          btnSave.innerText = '📸 บันทึกข้อมูลใบหน้า';
          btnSave.disabled = false;
        })
        .catch(err => {
          status.innerHTML = '<span class="error">❌ ไม่สามารถเปิดกล้องได้</span>';
        });
    }

    async function handleRegister() {
      const studentId = document.getElementById('studentId').value.trim();
      const name = document.getElementById('name').value.trim();
      const year = document.getElementById('year').value;

      if (!studentId || !name) return alert('กรุณากรอกรหัสและชื่อให้ครบถ้วน');
      if (!API_URL) return alert('กรุณาตั้งค่า API URL ที่หน้าแรกก่อน');

      btnSave.disabled = true;
      btnSave.innerHTML = '<div class="loading-spinner"></div> กำลังประมวลผล...';
      status.innerText = '⏳ กำลังตรวจจับใบหน้า...';

      // ตรวจจับใบหน้า
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      
      if (!detection) {
        status.innerHTML = '<span class="error">❌ ไม่พบใบหน้า! กรุณามองที่กล้องตรงๆ</span>';
        btnSave.disabled = false;
        btnSave.innerText = '📸 บันทึกข้อมูลใบหน้า';
        return;
      }

      status.innerText = '☁️ กำลังส่งข้อมูลไปยัง Google Sheets...';

      try {
        const payload = {
          action: 'registerUser',
          studentId: studentId,
          name: name,
          year: year,
          faceDescriptor: Array.from(detection.descriptor)
        };

        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        
        if (result.success) {
          status.innerHTML = `<span class="success">✅ ${result.message}</span>`;
          document.getElementById('studentId').value = '';
          document.getElementById('name').value = '';
        } else {
          status.innerHTML = `<span class="error">❌ ${result.error || 'เกิดข้อผิดพลาด'}</span>`;
        }
      } catch (e) {
        status.innerHTML = '<span class="error">❌ การเชื่อมต่อล้มเหลว ตรวจสอบ API URL</span>';
      }
      
      btnSave.disabled = false;
      btnSave.innerText = '📸 บันทึกข้อมูลใบหน้า';
    }

    btnSave.addEventListener('click', handleRegister);
    loadModels();
  </script>
</body>
</html>
