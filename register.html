<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Load Face-API -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  
  <style>
    /* --- Base Styles --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient Orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    body::before { width: 400px; height: 400px; background: #dbeafe; top: -100px; right: -100px; }
    body::after { width: 350px; height: 350px; background: #ede9fe; bottom: -80px; left: -80px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .top-nav {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      width: 45px; height: 45px;
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: #64748b; font-size: 1.2rem;
      transition: 0.3s;
    }

    .page-title {
      flex-grow: 1;
      font-size: 1.4rem; font-weight: 700; color: #1e293b;
      margin-right: 45px;
    }

    /* --- Form Card --- */
    .form-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      border-radius: 30px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      margin-bottom: 24px;
      text-align: left;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 15px;
    }

    .input-group { margin-bottom: 20px; }

    .input-group label {
      display: block; font-size: 0.85rem; font-weight: 700;
      color: #64748b; margin-bottom: 6px; margin-left: 4px;
    }

    .input-control {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 14px 18px;
      font-family: inherit; font-size: 1rem; color: #1e293b;
      outline: none; transition: 0.3s;
    }

    .input-control:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* --- Camera Area --- */
    .camera-container {
      margin-top: 10px;
      margin-bottom: 20px;
      text-align: center;
    }

    .camera-wrapper {
      width: 100%;
      aspect-ratio: 4/3;
      background: #f1f5f9;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      border: 4px solid #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    .camera-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }

    .face-guide {
      width: 200px; height: 260px;
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 50% 50% 40% 40%;
    }

    /* --- Footer Actions --- */
    .step-indicator {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;
    }
    .dot {
      width: 10px; height: 10px; background: #e2e8f0; border-radius: 5px; transition: 0.4s;
    }
    .dot.active { width: 30px; background: #6366f1; }

    .btn-submit {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 18px;
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }
    .btn-submit:hover { background: #4f46e5; transform: translateY(-2px); }
    .btn-submit:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

    .status-msg {
      margin-top: 15px; text-align: center; font-size: 0.9rem; min-height: 24px;
    }

    /* Animation */
    .animate-in { animation: fadeInUp 0.7s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container animate-in">
    <div class="top-nav">
      <a href="index.html" class="btn-back">❮</a>
      <h1 class="page-title">ลงทะเบียนนักศึกษา</h1>
    </div>

    <div class="form-card">
      <!-- ส่วนข้อมูลส่วนตัว -->
      <div class="input-group">
        <label for="studentName">ชื่อ-นามสกุล</label>
        <input type="text" id="studentName" class="input-control" placeholder="ระบุชื่อจริง-นามสกุล..." autocomplete="off">
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="studentID">รหัสนักศึกษา</label>
          <input type="text" id="studentID" class="input-control" placeholder="เช่น 64XXXXXX" maxlength="15">
        </div>
        <div class="input-group">
          <label for="studentYear">ชั้นปี</label>
          <select id="studentYear" class="input-control">
            <option value="1">ปี 1</option>
            <option value="2">ปี 2</option>
            <option value="3">ปี 3</option>
            <option value="4">ปี 4</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
        </div>
      </div>

      <!-- ส่วนกล้อง -->
      <div class="camera-container">
        <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #64748b; margin-bottom: 10px; text-align: left; margin-left: 4px;">
          สแกนใบหน้าต้นแบบ (แนะนำ 3 ครั้ง)
        </label>
        <div class="camera-wrapper">
          <video id="video" autoplay muted playsinline></video>
          <div class="camera-overlay">
            <div class="face-guide"></div>
          </div>
        </div>
      </div>

      <!-- ขั้นตอนการเก็บใบหน้า -->
      <div class="step-indicator">
        <div id="dot1" class="dot"></div>
        <div id="dot2" class="dot"></div>
        <div id="dot3" class="dot"></div>
      </div>

      <button id="btnSave" class="btn-submit">
        <span>📸 บันทึกข้อมูลใบหน้า</span>
      </button>

      <div id="msgDiv" class="status-msg"></div>
    </div>

    <p style="font-size: 0.8rem; color: #94a3b8; text-align: center;">
      กรุณาถอดแว่นดำหรือหน้ากากอนามัยขณะลงทะเบียนเพื่อความแม่นยำ
    </p>
  </div>

  <script>
    // ดึงค่า Config จาก LocalStorage
    const API_URL = localStorage.getItem('gasApiUrl');
    const video = document.getElementById('video');
    const btnSave = document.getElementById('btnSave');
    const msgDiv = document.getElementById('msgDiv');
    let saveCount = 0;

    // เริ่มกล้อง
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        
        // โหลด Model ของ Face-API (ใช้ CDN)
        msgDiv.innerText = '⏳ กำลังโหลด AI Models...';
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
          faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
          faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
        ]);
        msgDiv.innerText = '✅ ระบบพร้อมลงทะเบียน';
      } catch (err) {
        msgDiv.innerHTML = '<span style="color:red">❌ กล้องขัดข้อง: ' + err.message + '</span>';
      }
    }

    // ฟังก์ชันบันทึก
    btnSave.addEventListener('click', async () => {
      const name = document.getElementById('studentName').value.trim();
      const id = document.getElementById('studentID').value.trim();
      const year = document.getElementById('studentYear').value;

      if (!name || !id) {
        msgDiv.innerHTML = '<span style="color:#ef4444">⚠️ กรุณากรอกชื่อและรหัสนักศึกษา</span>';
        return;
      }

      if (!API_URL) {
        msgDiv.innerHTML = '<span style="color:#ef4444">⚠️ ไม่พบ API URL กรุณาตั้งค่าก่อน</span>';
        return;
      }

      btnSave.disabled = true;
      btnSave.innerText = '⏳ กำลังประมวลผลใบหน้า...';

      // ตรวจจับใบหน้า
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

      if (!detection) {
        msgDiv.innerHTML = '<span style="color:#ef4444">❌ ไม่พบใบหน้า! กรุณามองที่กล้อง</span>';
        btnSave.disabled = false;
        btnSave.innerText = '📸 บันทึกข้อมูลใบหน้า';
        return;
      }

      // เตรียมข้อมูล (รวม ชื่อ + รหัส + ปี เป็นสตริงชื่อเพื่อความง่ายในระบบเดิม หรือจะแก้ GAS ก็ได้)
      // ในที่นี้จะใช้รูปแบบ: "สมชาย ใจดี (640001) - ปี 1"
      const fullName = `${name} (${id}) - ปี ${year}`;
      const descriptorArray = Array.from(detection.descriptor);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'registerUser',
            name: fullName,
            faceDescriptor: descriptorArray
          })
        });
        const result = await response.json();

        if (result.success) {
          saveCount++;
          if (saveCount <= 3) {
            document.getElementById('dot' + saveCount).classList.add('active');
          }
          
          msgDiv.innerHTML = `<span style="color:#10b981">✅ บันทึกรอบที่ ${saveCount} สำเร็จ!</span>`;
          
          if (saveCount >= 3) {
            btnSave.innerText = '🎉 ลงทะเบียนสำเร็จแล้ว';
            btnSave.style.background = '#10b981';
          } else {
            btnSave.disabled = false;
            btnSave.innerText = '📸 บันทึกเพิ่ม (รอบถัดไป)';
          }
        }
      } catch (error) {
        msgDiv.innerHTML = '<span style="color:#ef4444">❌ เกิดข้อผิดพลาดในการเชื่อมต่อ</span>';
        btnSave.disabled = false;
        btnSave.innerText = '📸 บันทึกข้อมูลใบหน้า';
      }
    });

    window.onload = initCamera;
  </script>
</body>
</html>
