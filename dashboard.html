<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>แผงควบคุมอาจารย์ - ข้อมูลการเข้าเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; min-width: 200px; }
    
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 12px; text-transform: uppercase; }
    
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-ontime { background: #dcfce7; color: #166534; }
    .status-late { background: #fee2e2; color: #991b1b; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .stat-card { background: white; padding: 20px; border-radius: 16px; border-left: 4px solid var(--primary); }
    .stat-label { font-size: 13px; color: #64748b; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>👨‍🏫 แผงควบคุมอาจารย์</h1>
    <button onclick="loadData()" style="padding:10px 20px; border-radius:8px; border:none; background:var(--primary); color:white; cursor:pointer;">🔄 รีเฟรชข้อมูล</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">จำนวนการเข้าเรียนวันนี้</div><div class="stat-value" id="countToday">0</div></div>
    <div class="stat-card" style="border-color:#10b981"><div class="stat-label">มาสาย</div><div class="stat-value" id="countLate">0</div></div>
  </div>

  <div class="card">
    <div class="filter-bar">
      <label>เลือกดูรายวิชา:</label>
      <select id="subjectFilter" onchange="loadData()">
        <option value="all">ทุกรายวิชา</option>
      </select>
    </div>

    <div id="loadingText" style="text-align:center; padding:20px;">กำลังดึงข้อมูลจาก Google Sheets...</div>

    <table id="logTable" style="display:none;">
      <thead>
        <tr>
          <th>นักศึกษา</th>
          <th>วันที่</th>
          <th>เวลา</th>
          <th>วิชา</th>
          <th>สถานะ</th>
        </tr>
      </thead>
      <tbody id="logList"></tbody>
    </table>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');

  async function init() {
    if (!API_URL) {
      alert("กรุณาไปที่หน้า Config เพื่อตั้งค่า API URL ก่อน");
      return;
    }
    await loadSubjects();
    await loadData();
  }

  // ดึงรายชื่อวิชามาใส่ใน Dropdown
  async function loadSubjects() {
    try {
      const res = await fetch(`${API_URL}?action=getSubjects`);
      const data = await res.json();
      const filter = document.getElementById('subjectFilter');
      
      data.subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.innerText = `${s.id} - ${s.name}`;
        filter.appendChild(opt);
      });
    } catch (e) { console.error("Load subjects failed", e); }
  }

  // ดึงข้อมูลการเช็คชื่อ
  async function loadData() {
    const filterSub = document.getElementById('subjectFilter').value;
    const loading = document.getElementById('loadingText');
    const table = document.getElementById('logTable');
    const list = document.getElementById('logList');

    loading.style.display = "block";
    table.style.display = "none";

    try {
      const res = await fetch(`${API_URL}?action=getSummary&subject=${encodeURIComponent(filterSub)}`);
      const data = await res.json();
      
      list.innerHTML = "";
      let lateCount = 0;
      const today = new Date().toLocaleDateString('en-CA'); // yyyy-mm-dd

      data.logs.forEach(log => {
        if (log.status === 'Late') lateCount++;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><b>${log.name}</b></td>
          <td>${log.date.split('T')[0]}</td>
          <td>${log.time}</td>
          <td>${log.subject}</td>
          <td><span class="status-badge ${log.status === 'Late' ? 'status-late' : 'status-ontime'}">${log.status}</span></td>
        `;
        list.appendChild(tr);
      });

      document.getElementById('countToday').innerText = data.logs.length;
      document.getElementById('countLate').innerText = lateCount;

      loading.style.display = "none";
      table.style.display = "table";
    } catch (e) {
      loading.innerText = "❌ ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการตั้งค่า";
    }
  }

  init();
</script>
</body>
</html>
