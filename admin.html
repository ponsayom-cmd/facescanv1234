<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - คณะ/มหาวิทยาลัย</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .stat-val { font-size: 32px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 13px; color: #64748b; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { background: #f8fafc; color: #64748b; font-size: 14px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-late { background: #fef9c3; color: #854d0e; }
    .btn { background: #1e293b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <p style="color:var(--primary); font-weight:700; font-size:14px;">UNIVERSITY ADMIN SYSTEM</p>
      <h1 id="classInfo">กำลังโหลด...</h1>
    </div>
    <button class="btn" onclick="exportCSV()">📥 ส่งออก CSV (Excel)</button>
  </div>

  <div class="grid">
    <div class="card"><div id="t_total" class="stat-val">0</div><div class="stat-label">นักศึกษาทั้งหมด</div></div>
    <div class="card"><div id="t_present" class="stat-val">0</div><div class="stat-label">เข้าเรียนวันนี้</div></div>
    <div class="card"><div id="t_late" class="stat-val">0</div><div class="stat-label">มาสาย</div></div>
    <div class="card"><div id="t_absent" class="stat-val">0</div><div class="stat-label">ยังไม่มา</div></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>รหัส/ชื่อนักศึกษา</th>
        <th>เวลาสแกน</th>
        <th>สถานะ</th>
      </tr>
    </thead>
    <tbody id="logList"></tbody>
  </table>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  let currentLogs = [];

  async function load() {
    if(!API_URL) return alert('กรุณาตั้งค่า API URL ก่อน');
    const config = await fetch(API_URL + "?action=getConfig").then(r => r.json());
    document.getElementById('classInfo').innerText = `${config.subject} (${config.room})`;
    
    const summary = await fetch(`${API_URL}?action=getSummary&subject=${encodeURIComponent(config.subject)}`).then(r => r.json());
    document.getElementById('t_total').innerText = summary.total;
    document.getElementById('t_present').innerText = summary.present;
    document.getElementById('t_late').innerText = summary.late;
    document.getElementById('t_absent').innerText = summary.absent;

    const logs = await fetch(`${API_URL}?action=getLogs&subject=${encodeURIComponent(config.subject)}`).then(r => r.json());
    currentLogs = logs.logs;
    document.getElementById('logList').innerHTML = currentLogs.map(l => `
      <tr>
        <td>${l.name}</td>
        <td>${l.time}</td>
        <td><span class="badge ${l.status === 'Late' ? 'badge-late' : 'badge-ok'}">${l.status === 'Late' ? 'สาย' : 'ปกติ'}</span></td>
      </tr>
    `).join('') || '<tr><td colspan="3" style="text-align:center; padding:20px;">ไม่มีข้อมูลเช็คชื่อในวันนี้</td></tr>';
  }

  function exportCSV() {
    let csv = "\uFEFFStudent,Time,Status\n";
    currentLogs.forEach(l => { csv += `"${l.name}","${l.time}","${l.status}"\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `attendance_report_${new Date().toLocaleDateString()}.csv`;
    link.click();
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
