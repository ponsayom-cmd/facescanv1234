<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบเช็คชื่อเข้าชั้นเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS หลักสำหรับหน้า Dashboard */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 8px; }
    .header p { color: #94a3b8; }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }
    .menu-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .menu-card:hover {
      background: rgba(56, 189, 248, 0.1);
      transform: translateY(-5px);
      border-color: #38bdf8;
    }
    .icon { font-size: 2.5rem; }
    .title { font-size: 1.25rem; font-weight: 600; color: #fff; }
    .desc { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; }
    
    .warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid #f59e0b;
      color: #fbbf24;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div style="font-size: 3rem; margin-bottom: 10px;">🎓</div>
    <h1>ระบบเช็คชื่อเข้าชั้นเรียน</h1>
    <p>Smart Classroom Attendance System</p>
  </div>

  <div id="setupNotice" class="warning" style="display:none;">
    ⚠️ ตรวจพบว่ายังไม่ได้ตั้งค่า API หรือพิกัดห้องเรียน <a href="config.html" style="color: #fbbf24;">คลิกที่นี่เพื่อตั้งค่า</a>
  </div>

  <div class="menu-grid">
    <!-- ลงทะเบียนนักเรียน -->
    <a href="register.html" class="menu-card">
      <div class="icon">📝</div>
      <div>
        <div class="title">ลงทะเบียนนักเรียน</div>
        <div class="desc">บันทึกใบหน้าและข้อมูลนักเรียนใหม่</div>
      </div>
    </a>

    <!-- เช็คชื่อเข้าเรียน -->
    <a href="scan.html" class="menu-card">
      <div class="icon">📸</div>
      <div>
        <div class="title">เช็คชื่อเข้าเรียน</div>
        <div class="desc">สแกนใบหน้าเพื่อบันทึกการเข้าเรียน</div>
      </div>
    </a>

    <!-- ตั้งค่าห้องเรียน -->
    <a href="config.html" class="menu-card">
      <div class="icon">⚙️</div>
      <div>
        <div class="title">ตั้งค่าห้องเรียน</div>
        <div class="desc">กำหนดพิกัด GPS และเชื่อมต่อระบบ</div>
      </div>
    </a>
  </div>

  <script>
    // ตรวจสอบเบื้องต้นว่ามีการตั้งค่าหรือยัง
    window.onload = () => {
      const apiUrl = localStorage.getItem('gasApiUrl');
      if (!apiUrl) {
        document.getElementById('setupNotice').style.display = 'block';
      }
    };
  </script>
</body>
</html>
