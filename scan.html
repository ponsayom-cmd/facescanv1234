<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Scanner - University</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .viewport { position: relative; width: 400px; height: 400px; border-radius: 50%; border: 5px solid #334155; overflow: hidden; box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); }
    video { width: 100%; height: 100%; object-fit: cover; }
    .scan-line { position: absolute; top: 0; width: 100%; height: 4px; background: #6366f1; box-shadow: 0 0 15px #6366f1; animation: scan 3s infinite linear; }
    @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    .btn-confirm { background: #6366f1; color: white; padding: 20px 60px; border: none; border-radius: 50px; font-size: 24px; font-weight: 700; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

<div style="text-align:center; margin-bottom:20px;">
  <h1 id="subjectName">กำลังเตรียมระบบ...</h1>
  <div id="clock" style="font-size: 20px; color: #818cf8;">00:00:00</div>
</div>

<div class="viewport">
  <video id="video" autoplay muted playsinline></video>
  <div class="scan-line"></div>
</div>

<p id="status" style="margin-top:20px; color: #94a3b8;">🔍 ค้นหาใบหน้า...</p>

<div id="resultLayer" class="overlay">
  <div style="font-size: 16px; color: #94a3b8;">นักศึกษาที่ตรวจพบ:</div>
  <h1 id="studentName" style="font-size: 48px; color: #4ade80; margin: 10px 0;"></h1>
  <div id="lateNote" style="color: #fbbf24; display: none; font-weight: 700;">⚠️ ตรวจพบ: เข้าเรียนสาย</div>
  <button class="btn-confirm" onclick="submit()">ยืนยันข้อมูล</button>
  <p onclick="location.reload()" style="margin-top:20px; cursor:pointer; color:#475569;">สแกนใหม่</p>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  let matcher = null;
  let config = {};

  setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

  async function start() {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
      faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
      faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
    ]);
    
    video.srcObject = await navigator.mediaDevices.getUserMedia({ video: {} });
    
    if (API_URL) {
      config = await fetch(API_URL + "?action=getConfig").then(r => r.json());
      document.getElementById('subjectName').innerText = config.subject;
      const faces = await fetch(API_URL + "?action=getKnownFaces").then(r => r.json());
      if (faces.faces.length > 0) {
        const labeled = faces.faces.map(f => new faceapi.LabeledFaceDescriptors(f.name, f.descriptors.map(d => new Float32Array(d))));
        matcher = new faceapi.FaceMatcher(labeled, 0.6);
        detect();
      }
    }
  }

  async function detect() {
    const d = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if (d) {
      const m = matcher.findBestMatch(d.descriptor);
      if (m.label !== 'unknown') {
        document.getElementById('studentName').innerText = m.label;
        document.getElementById('resultLayer').style.display = 'flex';
        
        const [h, min] = config.lateTime.split(':');
        const limit = new Date(); limit.setHours(h, min, 0);
        if (new Date() > limit) document.getElementById('lateNote').style.display = 'block';
        return;
      }
    }
    requestAnimationFrame(detect);
  }

  async function submit() {
    const name = document.getElementById('studentName').innerText;
    const isLate = document.getElementById('lateNote').style.display === 'block';
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'logAttendance', name, subject: config.subject, room: config.room, isLate })
    });
    alert('เช็คชื่อสำเร็จ!');
    location.reload();
  }

  start();
</script>
</body>
</html>
