<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้าเรียน - เลือกวิชา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #4f46e5; --success: #10b981; --bg: #0f172a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: var(--bg);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .selector-card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #818cf8; }
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    #videoContainer {
      position: relative;
      width: 100%;
      max-width: 350px;
      aspect-ratio: 1/1;
      background: #000;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--primary);
      display: none; /* ซ่อนไว้ก่อนเลือกวิชา */
    }
    video { width: 100%; height: 100%; object-fit: cover; }

    .btn-start {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; color: #1e293b; padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
    .btn-confirm { width: 100%; background: var(--success); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; margin-top: 15px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="selector-card" id="setupSection">
    <h2 style="margin-bottom: 15px; font-size: 1.25rem;">📝 เลือกรายวิชา</h2>
    <label for="subjectSelect">วิชาที่เข้าเรียนวันนี้:</label>
    <select id="subjectSelect">
      <option value="">กำลังโหลดรายชื่อวิชา...</option>
    </select>
    <button class="btn-start" id="startBtn" onclick="prepareScanner()">เปิดกล้องสแกนใบหน้า</button>
  </div>

  <div id="videoContainer">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div id="statusText" style="margin-top: 15px; font-weight: 600;"></div>

  <!-- Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3 style="color: var(--primary);">✅ ยืนยันตัวตนสำเร็จ</h3>
      <div id="confirmDetails" style="text-align: left; margin: 20px 0; line-height: 1.8;"></div>
      <button class="btn-confirm" id="finalBtn" onclick="submitAttendance()">ยืนยันบันทึกเวลาเรียน</button>
    </div>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');
    const video = document.getElementById('video');
    const statusText = document.getElementById('statusText');
    const subjectSelect = document.getElementById('subjectSelect');
    
    let faceMatcher = null;
    let subjects = [];
    let selectedSubject = null;
    let identifiedName = "";

    async function init() {
      if (!API_URL) {
        statusText.innerText = "❌ กรุณาตั้งค่า API URL";
        return;
      }

      try {
        // โหลดวิชา
        const subRes = await fetch(API_URL + "?action=getSubjects");
        const subData = await subRes.json();
        subjects = subData.subjects;
        
        subjectSelect.innerHTML = subjects.map((s, index) => 
          `<option value="${index}">${s.id} - ${s.name}</option>`
        ).join('');

        // โหลดใบหน้า
        const faceRes = await fetch(API_URL + "?action=getKnownFaces");
        const faceData = await faceRes.json();
        if (faceData.faces.length > 0) {
          const labeled = faceData.faces.map(f => new faceapi.LabeledFaceDescriptors(f.name, f.descriptors.map(d => new Float32Array(d))));
          faceMatcher = new faceapi.FaceMatcher(labeled, 0.5);
        }

        // โหลด AI Models
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
          faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
          faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
        ]);

        statusText.innerText = "✅ ระบบพร้อมใช้งาน";
      } catch (e) {
        statusText.innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
      }
    }

    async function prepareScanner() {
      const idx = subjectSelect.value;
      if (idx === "") return alert("กรุณาเลือกวิชา");
      selectedSubject = subjects[idx];

      document.getElementById('setupSection').style.display = "none";
      document.getElementById('videoContainer').style.display = "block";
      statusText.innerText = "🔍 กำลังสแกนใบหน้า...";

      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;

      const loop = setInterval(async () => {
        const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if (detect && faceMatcher) {
          const match = faceMatcher.findBestMatch(detect.descriptor);
          if (match.label !== 'unknown') {
            clearInterval(loop);
            showModal(match.label);
          }
        }
      }, 1000);
    }

    function showModal(name) {
      identifiedName = name;
      
      const now = new Date();
      const [h, m] = selectedSubject.lateTime.split(':');
      const limit = new Date(); limit.setHours(h, m, 0);
      const isLate = now > limit;

      document.getElementById('confirmDetails').innerHTML = `
        <b>ชื่อ-รหัส:</b> ${name}<br>
        <b>วิชา:</b> ${selectedSubject.name}<br>
        <b>ห้อง:</b> ${selectedSubject.room}<br>
        <b>สถานะ:</b> <span style="color:${isLate?'red':'green'}">${isLate?'สาย':'ปกติ'}</span>
      `;
      document.getElementById('confirmModal').style.display = "flex";
      video.srcObject.getTracks().forEach(t => t.stop());
    }

    async function submitAttendance() {
      const btn = document.getElementById('finalBtn');
      btn.disabled = true;
      btn.innerText = "⌛ กำลังบันทึก...";

      try {
        const now = new Date();
        const [h, m] = selectedSubject.lateTime.split(':');
        const limit = new Date(); limit.setHours(h, m, 0);

        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'logAttendance',
            name: identifiedName,
            subject: selectedSubject.name,
            room: selectedSubject.room,
            isLate: now > limit
          })
        });
        const result = await res.json();
        alert(result.message);
        window.location.href = "index.html";
      } catch (e) {
        alert("❌ บันทึกล้มเหลว");
        btn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
