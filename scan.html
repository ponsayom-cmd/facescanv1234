<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เช็คชื่อเข้าชั้นเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .scanner-window {
      position: relative;
      width: 100%;
      max-width: 450px;
      aspect-ratio: 3/4;
      background: #000;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
      margin-top: 20px;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; }
    .scan-line {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(59, 130, 246, 0.8);
      box-shadow: 0 0 15px #3b82f6;
      animation: scan 3s infinite linear;
      z-index: 10;
    }
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
    .info-panel {
      margin-top: 25px;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      font-size: 14px;
      margin-bottom: 15px;
    }
    .result-card {
      display: none;
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #3b82f6;
      margin-top: 20px;
    }
    .btn-confirm {
      background: #10b981;
      border: none;
      color: white;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 700;
      width: 100%;
      margin-top: 15px;
      cursor: pointer;
    }
    .loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f172a; z-index: 1000; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
    }
  </style>
</head>
<body>

  <div id="loadingScreen" class="loading-screen">
    <div style="font-size: 50px; margin-bottom: 20px;">🔍</div>
    <div id="loadingText">กำลังโหลดข้อมูลนักศึกษา...</div>
  </div>

  <div class="status-badge" id="gpsStatus">📍 กำลังตรวจพิกัดห้องเรียน...</div>

  <div class="scanner-window">
    <div class="scan-line"></div>
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="info-panel">
    <div id="mainStatus" style="font-size: 18px; font-weight: 600;">รอการสแกนใบหน้า...</div>
    
    <div id="resultCard" class="result-card">
      <div style="font-size: 14px; color: #94a3b8; margin-bottom: 5px;">พบนักศึกษา</div>
      <div id="studentNameDisplay" style="font-size: 22px; font-weight: 700; color: #60a5fa;">-</div>
      <button id="btnConfirm" class="btn-confirm">ยืนยันการเช็คชื่อเข้าเรียน</button>
    </div>
  </div>

  <script>
    let knownFaces = [];
    let faceMatcher = null;
    let isScanning = true;
    let currentStudent = null;
    let classroomConfig = null;
    let userLocation = null;

    const video = document.getElementById('video');
    const resultCard = document.getElementById('resultCard');
    const studentNameDisplay = document.getElementById('studentNameDisplay');
    const mainStatus = document.getElementById('mainStatus');

    async function init() {
      if (!API_URL) return alert('กรุณาตั้งค่า API URL ก่อน');

      try {
        // 1. โหลด AI Models
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);

        // 2. ดึงข้อมูลพิกัดห้องเรียน
        const configRes = await fetch(`${API_URL}?action=getConfig`);
        classroomConfig = await configRes.json();

        // 3. ดึงข้อมูลใบหน้านักศึกษา
        document.getElementById('loadingText').innerText = 'กำลังโหลดข้อมูลใบหน้า...';
        const faceRes = await fetch(`${API_URL}?action=getKnownFaces`);
        const faceData = await faceRes.json();

        if (faceData.length > 0) {
          const labeledDescriptors = faceData.map(f => {
            return new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]);
          });
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
        }

        // 4. เปิดกล้อง
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;

        // 5. เช็ค GPS
        checkLocation();

        document.getElementById('loadingScreen').style.display = 'none';
        startFaceDetection();

      } catch (err) {
        alert('เกิดข้อผิดพลาดในการเริ่มต้นระบบ: ' + err.message);
      }
    }

    function checkLocation() {
      if (!navigator.geolocation) {
        document.getElementById('gpsStatus').innerText = '❌ ไม่รองรับ GPS';
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        
        // คำนวณระยะห่าง (Simplified Haversine)
        const dist = haversineKm(userLocation.lat, userLocation.lng, classroomConfig.lat, classroomConfig.lng);
        if (dist <= classroomConfig.radius) {
          document.getElementById('gpsStatus').innerHTML = '✅ อยู่ในพื้นที่ห้องเรียน';
          document.getElementById('gpsStatus').style.color = '#34d399';
        } else {
          document.getElementById('gpsStatus').innerHTML = `⚠️ ไม่อยู่ในพื้นที่ (ห่าง ${Math.round(dist*1000)}ม.)`;
          document.getElementById('gpsStatus').style.color = '#f87171';
        }
      });
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function startFaceDetection() {
      if (!isScanning) return;

      const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (detection && faceMatcher) {
        const match = faceMatcher.findBestMatch(detection.descriptor);
        if (match.label !== 'unknown') {
          isScanning = false;
          currentStudent = match.label;
          studentNameDisplay.innerText = currentStudent;
          resultCard.style.display = 'block';
          mainStatus.innerText = 'สแกนสำเร็จ!';
          return;
        }
      }

      requestAnimationFrame(startFaceDetection);
    }

    document.getElementById('btnConfirm').addEventListener('click', async () => {
      const btn = document.getElementById('btnConfirm');
      btn.disabled = true;
      btn.innerText = '⏳ กำลังบันทึก...';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'logAttendance',
            studentInfo: currentStudent,
            lat: userLocation ? userLocation.lat : 0,
            lng: userLocation ? userLocation.lng : 0
          })
        });

        const result = await response.json();
        if (result.success) {
          alert('เช็คชื่อสำเร็จ ขอบคุณครับ');
          window.location.href = 'index.html';
        }
      } catch (err) {
        alert('บันทึกไม่สำเร็จ: ' + err.message);
        btn.disabled = false;
        btn.innerText = 'ยืนยันการเช็คชื่อเข้าเรียน';
      }
    });

    init();
  </script>
</body>
</html>
