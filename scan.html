<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนใบหน้าเข้าเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid #38bdf8;
    }
    video { width: 100%; transform: scaleX(-1); display: block; }
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
    
    .info-box {
      width: 100%;
      max-width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      text-align: center;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      background: #334155;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .btn-confirm {
      background: #22c55e;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      width: 100%;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🎓 เช็คชื่อเข้าเรียน</h1>
  
  <div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="info-box">
    <div id="status" class="status-badge">⏳ กำลังเตรียมระบบ AI...</div>
    <h2 id="studentName">รอยืนยันตัวตน...</h2>
    <p id="gpsStatus">Checking GPS...</p>
    <button id="btnConfirm" class="btn-confirm">✅ ยืนยันการเข้าเรียน</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const nameDisplay = document.getElementById('studentName');
    const gpsDisplay = document.getElementById('gpsStatus');
    const btnConfirm = document.getElementById('btnConfirm');
    
    let faceMatcher = null;
    let currentLat, currentLng;
    let isIdentified = false;

    async function init() {
      // โหลด AI Models
      await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
      await faceapi.nets.faceLandmarks68Net.loadFromUri('/models');
      await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
      
      status.innerText = '📂 กำลังโหลดฐานข้อมูลนักเรียน...';
      
      // ดึงข้อมูลใบหน้าที่ลงทะเบียนไว้
      try {
        const res = await fetch(`${API_URL}?action=getKnownFaces`);
        const data = await res.json();
        
        if (data.length === 0) {
          status.innerText = '❌ ยังไม่มีนักเรียนในระบบ';
          return;
        }

        const labeledDescriptors = data.map(item => {
          return new faceapi.LabeledFaceDescriptors(item.name, [new Float32Array(item.descriptor)]);
        });
        
        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
        status.innerText = '📸 พร้อมสแกนใบหน้า';
        startCamera();
      } catch (err) {
        status.innerText = '❌ โหลดฐานข้อมูลล้มเหลว';
      }
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      
      // ตรวจสอบพิกัด GPS
      navigator.geolocation.getCurrentPosition(pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        gpsDisplay.innerText = `📍 พิกัด: ${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
      });

      // ลูปตรวจสอบใบหน้า
      setInterval(async () => {
        if (isIdentified) return;
        
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if (detection) {
          const match = faceMatcher.findBestMatch(detection.descriptor);
          if (match.label !== 'unknown') {
            nameDisplay.innerText = match.label;
            nameDisplay.style.color = '#38bdf8';
            btnConfirm.style.display = 'block';
            status.innerText = '✅ พบข้อมูลนักเรียน';
          } else {
            nameDisplay.innerText = 'ไม่พบข้อมูล';
            btnConfirm.style.display = 'none';
          }
        }
      }, 1000);
    }

    btnConfirm.onclick = async () => {
      btnConfirm.disabled = true;
      btnConfirm.innerText = '⏳ กำลังบันทึก...';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'logAttendance',
            name: nameDisplay.innerText,
            lat: currentLat,
            lng: currentLng
          })
        });
        const result = await response.json();
        alert(result.message);
        window.location.href = 'index.html';
      } catch (e) {
        alert('ผิดพลาด: ' + e.message);
        btnConfirm.disabled = false;
      }
    };

    window.onload = init;
  </script>
</body>
</html>
