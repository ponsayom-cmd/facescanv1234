<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้าห้องเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: #fff; text-align: center; padding: 20px; }
    .video-container { position: relative; display: inline-block; border: 5px solid #38bdf8; border-radius: 15px; overflow: hidden; width: 100%; max-width: 400px; }
    video { width: 100%; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
    .status-panel { margin-top: 20px; background: #1e293b; padding: 20px; border-radius: 10px; }
    .btn { background: #22c55e; color: #fff; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🎓 สแกนใบหน้าเข้าเรียน</h1>
  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div class="status-panel">
    <div id="status">⏳ กำลังเตรียมระบบ...</div>
    <h2 id="studentName">รอยืนยันใบหน้า...</h2>
    <p id="location">Checking Location...</p>
    <button id="btnConfirm" class="btn">✅ ยืนยันการเข้าเรียน</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const statusTxt = document.getElementById('status');
    const nameTxt = document.getElementById('studentName');
    const btn = document.getElementById('btnConfirm');
    let faceMatcher = null;
    let myLat, myLng;

    async function setup() {
      try {
        statusTxt.innerText = "⏳ โหลดโมเดล AI...";
        // หากรันบนเครื่องตัวเอง ให้ตรวจสอบว่ามีโฟลเดอร์ models หรือใช้ URL สำรองได้
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models'; 
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

        statusTxt.innerText = "⏳ ดึงข้อมูลนักเรียน...";
        const res = await fetch(`${API_URL}?action=getKnownFaces`);
        const data = await res.json();

        if (data.length > 0) {
          const labeledDescriptors = data.map(d => new faceapi.LabeledFaceDescriptors(d.name, [new Float32Array(d.descriptor)]));
          faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
          statusTxt.innerText = "✅ พร้อมสแกนใบหน้า";
          startStream();
        } else {
          statusTxt.innerText = "❌ ไม่พบข้อมูลนักเรียนในระบบ";
        }
      } catch (e) {
        statusTxt.innerText = "❌ ข้อผิดพลาด: " + e.message;
      }
    }

    async function startStream() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      navigator.geolocation.getCurrentPosition(p => {
        myLat = p.coords.latitude; myLng = p.coords.longitude;
        document.getElementById('location').innerText = `📍 พิกัดปัจจุบันของคุณเรียบร้อยแล้ว`;
      });

      video.addEventListener('play', () => {
        setInterval(async () => {
          const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
          if (detection) {
            const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
            if (bestMatch.label !== 'unknown') {
              nameTxt.innerText = bestMatch.label;
              nameTxt.style.color = "#38bdf8";
              btn.style.display = "block";
            } else {
              nameTxt.innerText = "ไม่พบนักเรียนในระบบ";
              btn.style.display = "none";
            }
          }
        }, 1000);
      });
    }

    btn.onclick = async () => {
      btn.innerText = "⏳ บันทึกข้อมูล...";
      btn.disabled = true;
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'logAttendance', name: nameTxt.innerText, lat: myLat, lng: myLng })
        });
        const result = await res.json();
        alert(result.message);
        window.location.href = 'index.html';
      } catch (e) { alert("ล้มเหลว: " + e.message); btn.disabled = false; }
    };

    window.onload = setup;
  </script>
</body>
</html>
